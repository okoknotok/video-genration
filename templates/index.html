<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI Film Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
            font-size: 1.1em;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .mode-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px 35px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            min-width: 250px;
        }

        .mode-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
        }

        .mode-card.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.15);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.2);
        }

        .mode-card .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .mode-card h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
        }

        .mode-card p {
            color: #888;
            font-size: 0.9em;
        }

        /* Main Panel */
        .main-panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ccc;
        }

        .form-group textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px;
            color: #e0e0e0;
            font-size: 1em;
            resize: vertical;
            font-family: inherit;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group select, .form-group input[type="number"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 15px;
            color: #e0e0e0;
            font-size: 1em;
        }

        .form-group select:focus, .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn-generate {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress */
        .progress-section {
            display: none;
            margin-top: 30px;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s;
        }

        .progress-text {
            text-align: center;
            color: #aaa;
            margin-bottom: 15px;
        }

        .log-container {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .log-line {
            padding: 3px 0;
            color: #8f8;
        }

        .log-line.error {
            color: #f88;
        }

        /* Result */
        .result-section {
            display: none;
            margin-top: 30px;
            text-align: center;
        }

        .result-section.active {
            display: block;
        }

        .result-section video {
            max-width: 100%;
            max-height: 500px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .btn-download {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-download:hover {
            background: #218838;
        }

        /* History */
        .history-section {
            margin-top: 40px;
        }

        .history-section h2 {
            margin-bottom: 15px;
            color: #ccc;
        }

        .job-list {
            display: grid;
            gap: 10px;
        }

        .job-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-item .job-info {
            flex: 1;
        }

        .job-item .job-mode {
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 5px;
            margin-right: 10px;
        }

        .job-mode.shorts {
            background: #e74c3c;
            color: white;
        }

        .job-mode.cinematic {
            background: #3498db;
            color: white;
        }

        .job-status {
            font-size: 0.85em;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .job-status.done {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }

        .job-status.running {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .job-status.error {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mode-selector {
                flex-direction: column;
            }
            
            .mode-card {
                min-width: auto;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 AI Film Studio</h1>
            <p>從劇本到成片，AI 全自動影片生成</p>
        </header>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <div class="mode-card active" data-mode="shorts" onclick="selectMode('shorts')">
                <div class="icon">⚡</div>
                <h3>Shorts 短片</h3>
                <p>60秒直向 • YouTube Shorts / Reels / TikTok<br>快速出片，零 LoRA 成本</p>
            </div>
            <div class="mode-card" data-mode="cinematic" onclick="selectMode('cinematic')">
                <div class="icon">🎬</div>
                <h3>Cinematic 長片</h3>
                <p>完整 pipeline • LoRA 角色一致性<br>韓漫風格，高質量長片</p>
            </div>
        </div>

        <!-- Main Panel -->
        <div class="main-panel">
            <div class="form-group">
                <label>📝 故事大綱 / 主題</label>
                <textarea id="prompt" placeholder="例：一個男人在深夜的便利店遇到神秘女子，她遞給他一張紙條後消失...&#10;&#10;或者簡單啲：3個令人震驚嘅心理學實驗"></textarea>
            </div>

            <div class="settings-grid">
                <div class="form-group">
                    <label>🎨 風格</label>
                    <select id="style"></select>
                </div>
                <div class="form-group">
                    <label>🎬 動畫模型</label>
                    <select id="model"></select>
                </div>
                <div class="form-group">
                    <label>🎙️ 語音</label>
                    <select id="voice"></select>
                </div>
                <div class="form-group">
                    <label>📊 場景數</label>
                    <input type="number" id="scenes" value="6" min="3" max="30">
                </div>
                <div class="form-group">
                    <label>🎭 語氣</label>
                    <select id="tone">
                        <option value="懸疑緊張">懸疑緊張</option>
                        <option value="爽快霸道">爽快霸道</option>
                        <option value="溫馨感人">溫馨感人</option>
                        <option value="搞笑輕鬆">搞笑輕鬆</option>
                        <option value="恐怖驚悚">恐怖驚悚</option>
                        <option value="勵志熱血">勵志熱血</option>
                        <option value="romantic">浪漫愛情</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🎞️ 動畫範圍</label>
                    <select id="animate_scope">
                        <option value="ai">AI 智能選擇（推薦）</option>
                        <option value="all">全部場景動</option>
                        <option value="none">全部靜態（最平）</option>
                    </select>
                </div>
            </div>

            <button class="btn-generate" onclick="generate()" id="btnGenerate">
                🚀 開始生成
            </button>
        </div>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="progress-text" id="progressText">準備中...</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="log-container" id="logContainer"></div>
        </div>

        <!-- Result -->
        <div class="result-section" id="resultSection">
            <h2>🎉 生成完成！</h2>
            <video id="resultVideo" controls></video>
            <br>
            <a class="btn-download" id="downloadLink" download>⬇️ 下載影片</a>
        </div>

        <!-- History -->
        <div class="history-section">
            <h2>📜 歷史紀錄</h2>
            <div class="job-list" id="jobList"></div>
        </div>
    </div>

    <script>
        let currentMode = 'shorts';
        let config = null;
        let currentJobId = null;
        let eventSource = null;

        // Load config
        async function loadConfig() {
            const res = await fetch('/api/config');
            config = await res.json();
            updateModeUI();
            updateVoiceOptions();
            loadJobs();
        }

        function selectMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.toggle('active', card.dataset.mode === mode);
            });
            updateModeUI();
        }

        function updateModeUI() {
            if (!config) return;
            const modeConfig = config.modes[currentMode];
            
            // Update styles
            const styleSelect = document.getElementById('style');
            styleSelect.innerHTML = '';
            for (const [key, label] of Object.entries(modeConfig.styles)) {
                styleSelect.innerHTML += `<option value="${key}">${label}</option>`;
            }

            // Update models
            const modelSelect = document.getElementById('model');
            modelSelect.innerHTML = '';
            for (const [key, info] of Object.entries(modeConfig.models)) {
                modelSelect.innerHTML += `<option value="${key}">${info.label} (${info.cost})</option>`;
            }

            // Update scenes default
            document.getElementById('scenes').value = currentMode === 'shorts' ? 6 : 12;
        }

        function updateVoiceOptions() {
            const voiceSelect = document.getElementById('voice');
            voiceSelect.innerHTML = '';
            for (const [key, label] of Object.entries(config.voices)) {
                voiceSelect.innerHTML += `<option value="${key}">${label}</option>`;
            }
        }

        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                alert('請輸入故事大綱或主題');
                return;
            }

            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';

            const payload = {
                mode: currentMode,
                prompt: prompt,
                model: document.getElementById('model').value,
                style: document.getElementById('style').value,
                voice: document.getElementById('voice').value,
                scenes: parseInt(document.getElementById('scenes').value),
                tone: document.getElementById('tone').value,
                animate_scope: document.getElementById('animate_scope').value,
                motion_strength: '輕微',
            };

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                    btn.disabled = false;
                    btn.textContent = '🚀 開始生成';
                    return;
                }

                currentJobId = data.job_id;
                startStreaming(data.job_id);

            } catch (e) {
                alert('Error: ' + e.message);
                btn.disabled = false;
                btn.textContent = '🚀 開始生成';
            }
        }

        function startStreaming(jobId) {
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('logContainer').innerHTML = '';

            if (eventSource) eventSource.close();

            eventSource = new EventSource(`/api/stream/${jobId}`);

            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if (data.log) {
                    addLog(data.log);
                }
                if (data.progress !== undefined) {
                    document.getElementById('progressBar').style.width = data.progress + '%';
                    document.getElementById('progressText').textContent = `進度: ${data.progress}%`;
                }
                if (data.status === 'done') {
                    eventSource.close();
                    showResult(data.output);
                    resetButton();
                    loadJobs();
                }
                if (data.status === 'error') {
                    eventSource.close();
                    addLog('❌ 生成失敗: ' + data.error, true);
                    resetButton();
                    loadJobs();
                }
            };

            eventSource.onerror = function() {
                eventSource.close();
                addLog('⚠️ 連接中斷，請刷新頁面查看狀態', true);
                resetButton();
            };
        }

        function addLog(msg, isError = false) {
            const container = document.getElementById('logContainer');
            const line = document.createElement('div');
            line.className = 'log-line' + (isError ? ' error' : '');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }

        function showResult(outputUrl) {
            document.getElementById('resultSection').classList.add('active');
            const video = document.getElementById('resultVideo');
            video.src = outputUrl;
            video.load();
            
            const link = document.getElementById('downloadLink');
            link.href = outputUrl;
            
            document.getElementById('progressSection').classList.remove('active');
        }

        function resetButton() {
            const btn = document.getElementById('btnGenerate');
            btn.disabled = false;
            btn.textContent = '🚀 開始生成';
        }

        async function loadJobs() {
            try {
                const res = await fetch('/api/jobs');
                const jobs = await res.json();
                const list = document.getElementById('jobList');
                list.innerHTML = '';
                
                for (const job of jobs) {
                    const item = document.createElement('div');
                    item.className = 'job-item';
                    item.innerHTML = `
                        <div class="job-info">
                            <span class="job-mode ${job.mode}">${job.mode === 'shorts' ? '⚡ Shorts' : '🎬 Cinema'}</span>
                            <strong>${job.prompt}</strong>
                            <br><small style="color:#888">${job.created_at}</small>
                        </div>
                        <span class="job-status ${job.status}">${
                            job.status === 'done' ? '✅ 完成' :
                            job.status === 'running' ? '⏳ 生成中' :
                            job.status === 'error' ? '❌ 失敗' : job.status
                        }</span>
                    `;
                    if (job.status === 'done' && job.output) {
                        item.style.cursor = 'pointer';
                        item.onclick = () => {
                            document.getElementById('resultSection').classList.add('active');
                            document.getElementById('resultVideo').src = job.output;
                            document.getElementById('resultVideo').load();
                            document.getElementById('downloadLink').href = job.output;
                            window.scrollTo({top: 0, behavior: 'smooth'});
                        };
                    }
                    list.appendChild(item);
                }
            } catch(e) {
                console.error('Failed to load jobs:', e);
            }
        }

        // Init
        loadConfig();
    </script>
</body>
</html>
